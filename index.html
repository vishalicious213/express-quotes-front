<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iHeard</title>
</head>

<body>
    <div style="display: flex; flex-direction: column; align-items: center;">
        <h1>I once heard...</h1>
        <div id="buttons" style="display: flex; gap: 1rem; align-items: center; margin-bottom: 2rem;">
            <button id="btn1">Chump</button>
            <button id="btn2">Life</button>
            <button id="btn3">Work</button>
        </div>
    
        <div style="width: 100%; display: flex; justify-content: center;">
            <img id="quotePic" src="" alt="">
        </div>
        
        <p style="color: gainsboro;"><span id="num">0</span> of <span id="total">0</span></p>
    </div>

    <script>
        const buttons = document.querySelector('#buttons')
        const img = document.querySelector('#quotePic')
        const num = document.querySelector('#num')
        const total = document.querySelector('#total')

        buttons.addEventListener('click', (e) => {
            const cat = e.target.id.at(-1)
            fetch(`https://express-quotes-kjon.onrender.com/img?category=${cat}`)
                .then(response => response.json())
                .then(data => {
                    img.src = `https://express-quotes-kjon.onrender.com/${cat}/${data.imgUrl}`
                    img.alt = data.imgUrl
                    num.textContent = data.imgNum
                    total.textContent = data.total
                })
        })

        img.addEventListener("load", () => {
            const isWide = img.naturalWidth > img.naturalHeight
            const isTall = img.naturalHeight > img.naturalWidth
            
            if (isWide) {
                img.style.width = "80%"
                img.style.height = "auto"
                img.style.maxWidth = "1200px"
            } else if (isTall) {
                img.style.width = "auto"
                img.style.height = "70vh"
                img.style.maxWidth = "300px"
            } else {
                img.style.width = "80%"
                img.style.height = "80%"
                img.style.maxWidth = "650px"
            }
        })
    </script>
</body>
</html>
