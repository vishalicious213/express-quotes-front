<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iHeard</title>
</head>

<body>
    <div style="display: flex; flex-direction: column; align-items: center;">
        <h1>I once heard...</h1>
        <div style="display: flex; gap: 1rem; align-items: center; margin-bottom: 2rem;">
            <button id="btn1">Category 1</button>
            <button id="btn2">Category 2</button>
            <button id="btn3">Category 3</button>
        </div>
    
        <div style="width: 100%; display: flex; justify-content: center;">
            <img id="quotePic" src="" alt="">
        </div>
        
        <p style="color: gainsboro;"><span id="num">0</span> of <span id="total">0</span></p>
    </div>

    <script>
        const btn1 = document.querySelector('#btn1')
        const btn2 = document.querySelector('#btn2')
        const btn3 = document.querySelector('#btn3')
        const img = document.querySelector('#quotePic')
        const num = document.querySelector('#num')
        const total = document.querySelector('#total')

        btn1.addEventListener('click', () => {
            fetch('https://express-quotes-kjon.onrender.com/img?category=1')
                .then(response => response.json())
                .then(data => {
                    img.src = `https://express-quotes-kjon.onrender.com/1/${data.imgUrl}`
                    img.alt = data.imgUrl
                    num.textContent = data.imgNum
                    total.textContent = data.total
                })
        })

        btn2.addEventListener('click', () => {
            fetch('https://express-quotes-kjon.onrender.com/img?category=2')
                .then(response => response.json())
                .then(data => {
                    img.src = `https://express-quotes-kjon.onrender.com/2/${data.imgUrl}`
                    img.alt = data.imgUrl
                    num.textContent = data.imgNum
                    total.textContent = data.total
                })
        })

        btn3.addEventListener('click', () => {
            fetch('https://express-quotes-kjon.onrender.com/img?category=3')
                .then(response => response.json())
                .then(data => {
                    img.src = `https://express-quotes-kjon.onrender.com/3/${data.imgUrl}`
                    img.alt = data.imgUrl
                    num.textContent = data.imgNum
                    total.textContent = data.total
                })
        })

        img.addEventListener("load", () => {
            const isWide = img.naturalWidth > img.naturalHeight
            const isTall = img.naturalHeight > img.naturalWidth
            
            if (isWide) {
                img.style.width = "80%"
                img.style.height = "auto"
                img.style.maxWidth = "1200px"
            } else if (isTall) {
                img.style.width = "auto"
                img.style.height = "70vh"
                img.style.maxWidth = "300px"
            } else {
                img.style.width = "80%"
                img.style.height = "80%"
                img.style.maxWidth = "650px"
            }
        })
    </script>
</body>
</html>
