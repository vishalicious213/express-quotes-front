<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iHeard</title>
</head>

<body>
    <div style="display: flex; flex-direction: column; align-items: center;">
        <h1>I heard this line once...</h1>
        <div style="display: flex; gap: 1rem; align-items: center; margin-bottom: 2rem;">
            <button id="btn1">Category 1</button>
            <button id="btn2">Category 2</button>
            <button id="btn3">Category 3</button>
        </div>
    
        <div style="width: 100%; display: flex; justify-content: center;">
            <img id="quotePic" src="" alt="">
        </div>
    </div>

    <script>
        const btn1 = document.querySelector('#btn1')
        const btn2 = document.querySelector('#btn2')
        const btn3 = document.querySelector('#btn3')
        const img = document.querySelector('#quotePic')

        btn1.addEventListener('click', () => {
            fetch('https://express-quotes-kjon.onrender.com/img')
                .then(response => response.json())
                .then(data => {
                    img.src = `https://express-quotes-kjon.onrender.com/${data.imgUrl}`
                    img.alt = data.imgUrl
                })
        })

        btn1.addEventListener('click', () => {
            fetch('https://express-quotes-kjon.onrender.com/img')
                .then(response => response.json())
                .then(data => {
                    img.src = `https://express-quotes-kjon.onrender.com/${data.imgUrl}`
                    img.alt = data.imgUrl
                })
        })

        btn2.addEventListener('click', () => {
            fetch('https://express-quotes-kjon.onrender.com/img')
                .then(response => response.json())
                .then(data => {
                    img.src = `https://express-quotes-kjon.onrender.com/${data.imgUrl}`
                    img.alt = data.imgUrl
                })
        })

        btn3.addEventListener('click', () => {
            fetch('https://express-quotes-kjon.onrender.com/img')
                .then(response => response.json())
                .then(data => {
                    img.src = `https://express-quotes-kjon.onrender.com/${data.imgUrl}`
                    img.alt = data.imgUrl
                })
        })

        img.addEventListener("load", () => {
            const isWide = img.naturalWidth > img.naturalHeight
            if (isWide) {
                img.style.width = "90%"
                img.style.height = "auto"
            } else {
                img.style.width = "auto"
                img.style.height = "70vh"
            }
        })
    </script>
</body>
</html>
